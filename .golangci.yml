version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  exclusions:
    paths:
      - debug
      - vendor
    rules:
      - linters: [revive]
        text: "package-comments"
      - linters: [revive]
        text: "exported .* should have comment"
      - linters: [revive]
        text: "comment on exported .* should be of the form"
      - linters: [revive]
        text: "var-naming"
      - linters: [revive]
        text: "unused-parameter"
      - linters: [revive]
        text: "blank-imports"
      - linters: [revive]
        text: "avoid meaningless package names"
      - linters: [revive]
        text: "avoid package names that conflict"

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  govet:
    enable:
      - shadow
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  goconst:
    min-len: 2
    min-occurrences: 2
